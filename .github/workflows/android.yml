name: Android CI

on:
  push:
    branches:
      - '**'

jobs:
  build:
    name: Build Play ARM APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew

      - name: Build playRelease APK (arm64-v8a)
        run: ./gradlew assemblePlayRelease
        working-directory: apps/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-arm64-apk
          path: apps/android/app/build/outputs/apk/play/release/*.apk
          retention-days: 7
